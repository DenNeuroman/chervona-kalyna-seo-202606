<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222222;
    --bg4: #2a2a2a;
    --border: #333333;
    --border2: #3f3f3f;
    --text: #e8e6e0;
    --text2: #a8a6a0;
    --text3: #6b6a66;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --green: #27ae60;
    --green2: #2ecc71;
    --amber: #e67e22;
    --blue: #2980b9;
    --purple: #8e44ad;
    --radius: 8px;
    --radius-sm: 5px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── STICKY HEADER ── */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 20px 10px;
  }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  #header-title { display: flex; align-items: center; gap: 10px; }
  #header-title .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  #header-title h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  #header-title .sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  #header-stats { display: flex; gap: 16px; align-items: center; }
  .stat-chip { font-size: 12px; color: var(--text2); }
  .stat-chip span { color: var(--text); font-weight: 500; }
  #pct-label { font-size: 12px; font-weight: 600; color: var(--green2); }
  #reset-btn { font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px 9px; cursor: pointer; transition: .15s; }
  #reset-btn:hover { color: var(--text2); border-color: var(--border2); }
  /* progress bar */
  #bar-wrap { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  #bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green2)); border-radius: 2px; transition: width .4s ease; width: 0%; }

  /* ── FILTER TABS ── */
  #filters { display: flex; gap: 6px; padding: 10px 20px 0; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 4px 12px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text2);
    transition: .15s; display: flex; align-items: center; gap: 5px;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn .cnt { background: rgba(255,255,255,.15); border-radius: 10px; padding: 0 6px; font-size: 11px; }

  /* ── MAIN ── */
  #main { max-width: 860px; margin: 0 auto; padding: 20px; }

  /* ── PHASE ── */
  .phase { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .phase-header {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    background: var(--bg3); cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .phase-header:hover { background: var(--bg4); }
  .phase-toggle { font-size: 10px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
  .phase-toggle.open { transform: rotate(90deg); }
  .phase-icon { font-size: 16px; flex-shrink: 0; }
  .phase-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .phase-meta { display: flex; align-items: center; gap: 8px; }
  .phase-progress { font-size: 11px; color: var(--text3); }
  .phase-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .status-urgent   { background: rgba(192,57,43,.2);  color: #e74c3c; }
  .status-active   { background: rgba(39,174,96,.2);  color: var(--green2); }
  .status-next     { background: rgba(230,126,34,.2); color: #f39c12; }
  .status-pending  { background: rgba(41,128,185,.2); color: #5dade2; }
  .status-ongoing  { background: rgba(142,68,173,.2); color: #bb8fce; }
  .phase-bar-wrap  { width: 60px; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .phase-bar-fill  { height: 100%; border-radius: 2px; transition: width .3s; }

  /* ── TASK LIST ── */
  .task-list { background: var(--bg2); }
  .task-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: var(--bg3); }
  .task-row.done-row { opacity: .5; }

  /* priority dot */
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .p-high   { background: #e74c3c; }
  .p-mid    { background: #f39c12; }
  .p-low    { background: #5dade2; }
  .p-info   { background: var(--text3); }

  /* checkbox */
  .cb { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: .15s; }
  .cb.checked { background: var(--green); border-color: var(--green); }
  .cb.checked::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 700; }

  /* task body */
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-sub { font-size: 11px; color: var(--text3); margin-top: 3px; line-height: 1.4; }
  .task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }
  .tag-seo    { background: rgba(192,57,43,.18); color: #e74c3c; }
  .tag-tech   { background: rgba(41,128,185,.18); color: #5dade2; }
  .tag-content{ background: rgba(39,174,96,.18);  color: var(--green2); }
  .tag-en     { background: rgba(142,68,173,.18); color: #bb8fce; }
  .tag-links  { background: rgba(230,126,34,.18); color: #f39c12; }
  .tag-wp     { background: rgba(52,152,219,.18); color: #7fb3d3; }
  .tag-quick  { background: rgba(255,255,255,.1);  color: var(--text2); }

  /* empty */
  #empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; display: none; }

  @media (max-width: 600px) {
    #header-stats { display: none; }
    #main { padding: 12px; }
    .phase-bar-wrap { display: none; }
  }
</style>

// ── STATE ──────────────────────────────────────────────────────────────────────
function load() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
}
function isDone(task) {
  return state[task.id] !== undefined ? state[task.id] : task.done;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  let totalDone = 0, totalAll = 0;
  const filterCounts = { urgent: 0, active: 0, next: 0, ongoing: 0, done: 0 };

  // count all for filters
  PHASES.forEach(ph => {
    if (ph.status !== 'active' && ph.status !== 'urgent' && ph.status !== 'next' && ph.status !== 'ongoing') return;
    filterCounts[ph.status] = (filterCounts[ph.status] || 0) + ph.tasks.length;
    ph.tasks.forEach(task => {
      if (isDone(task)) filterCounts.done++;
    });
  });

  // build visible phases
  PHASES.forEach(ph => {
    const phaseDone = ph.tasks.filter(t => isDone(t)).length;
    const phaseAll  = ph.tasks.length;
    totalDone += phaseDone;
    totalAll  += phaseAll;

    // filter
    if (currentFilter !== 'all' && currentFilter !== 'done' && ph.status !== currentFilter) return;
    if (currentFilter === 'done' && phaseDone === 0) return;

    const isOpen = state['__open_' + ph.id] !== false;
    const phPct  = phaseAll ? Math.round(phaseDone / phaseAll * 100) : 0;

    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';

    const statusColors = {
      urgent: '#c0392b', active: '#27ae60', next: '#e67e22', pending: '#2980b9', ongoing: '#8e44ad'
    };
    const barColor = statusColors[ph.status] || '#555';

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <span class="phase-toggle ${isOpen ? 'open' : ''}">▶</span>
        <span class="phase-icon">${ph.icon}</span>
        <span class="phase-name">${ph.name}</span>
        <div class="phase-meta">
          <span class="phase-progress">${phaseDone}/${phaseAll}</span>
          <span class="phase-status status-${ph.status}">${ph.statusLabel}</span>
          <div class="phase-bar-wrap">
            <div class="phase-bar-fill" style="width:${phPct}%;background:${barColor}"></div>
          </div>
        </div>
      </div>
    `;

    if (isOpen) {
      const listEl = document.createElement('div');
      listEl.className = 'task-list';

      let visibleTasks = ph.tasks;
      if (currentFilter === 'done') visibleTasks = ph.tasks.filter(t => isDone(t));

      visibleTasks.forEach(task => {
        const done = isDone(task);
        const row = document.createElement('div');
        row.className = 'task-row' + (done ? ' done-row' : '');
        row.onclick = () => toggleTask(task.id, task.done);

        const tagsHtml = (task.tags || []).map(tag => `<span class="tag tag-${tag}">${tagLabel(tag)}</span>`).join('');

        row.innerHTML = `
          <div class="priority-dot p-${task.priority}"></div>
          <div class="cb ${done ? 'checked' : ''}"></div>
          <div class="task-body">
            <div class="task-name ${done ? 'done' : ''}">${task.name}</div>
            ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ''}
            ${tagsHtml ? `<div class="task-tags">${tagsHtml}</div>` : ''}
          </div>
        `;
        listEl.appendChild(row);
      });
      phaseEl.appendChild(listEl);
    }

    container.appendChild(phaseEl);
  });

  // update header
  document.getElementById('h-done').textContent = totalDone;
  document.getElementById('h-total').textContent = totalAll;
  const pct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;
  document.getElementById('bar-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '% виконано';

  // filter counts
  document.getElementById('cnt-all').textContent = totalAll;
  document.getElementById('cnt-urgent').textContent  = PHASES.filter(p=>p.status==='urgent').reduce((s,p)=>s+p.tasks.length,0);
  document.getElementById('cnt-active').textContent  = PHASES.filter(p=>p.status==='active').reduce((s,p)=>s+p.tasks.length,0);
  document.getElementById('cnt-next').textContent    = PHASES.filter(p=>p.status==='next').reduce((s,p)=>s+p.tasks.length,0);
  document.getElementById('cnt-ongoing').textContent = PHASES.filter(p=>p.status==='ongoing').reduce((s,p)=>s+p.tasks.length,0);
  document.getElementById('cnt-done-f').textContent  = totalDone;

  document.getElementById('empty-state').style.display =
    container.children.length === 0 ? 'block' : 'none';
}

function tagLabel(tag) {
  const map = { seo:'SEO', tech:'Техніка', content:'Контент', en:'EN', links:'Посилання', wp:'WordPress', quick:'Швидко' };
  return map[tag] || tag;
}

function toggleTask(id, defaultDone) {
  state[id] = !isDone({ id, done: defaultDone });
  save(); render();
}

function togglePhase(id) {
  const key = '__open_' + id;
  state[key] = state[key] === false ? true : false;
  save(); render();
}

function setFilter(f, btn) {
  currentFilter = f === 'done-f' ? 'done' : f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function resetAll() {
  if (!confirm('Скинути стан всіх задач до початкового?')) return;
  localStorage.removeItem(KEY);
  state = {};
  render();
}

load();
render();
</script>
